services:
  app:
    build: .
    image: flask-api:latest
    container_name: flask-api
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    container_name: flask-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app