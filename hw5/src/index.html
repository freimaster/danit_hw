<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Заглушка</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #111;
  color: #eaeaea;
  font-family: Arial, sans-serif;
  overflow: hidden;
  transition: background 3s ease;
}

.box {
  text-align: center;
  transition: opacity 3s ease, transform 3s ease, filter 3s ease;
}

h1 {
  font-size: 42px;
  margin-bottom: 12px;
  animation: float 3s ease-in-out infinite;
}

p {
  font-size: 18px;
  opacity: 0.75;
  min-height: 24px;
}

/* плавання */
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* курсор */
.cursor::after {
  content: "|";
  margin-left: 4px;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%,50%,100% { opacity: 1; }
  25%,75% { opacity: 0; }
}

/* затемнення */
body.fade-dark {
  background: #000;
}

/* зникнення */
.box.fade-out {
  opacity: 0;
  transform: scale(0.96);
  filter: blur(6px);
}
</style>
</head>

<body>

<div class="box" id="box">
  <h1 id="title">А ось і нічого 🙂</h1>
  <p id="text" class="cursor"></p>
</div>

<script>
const phrases = [
  "А що ти тут шукаєш?",
  "Серйозно… тут порожньо.",
  "Можливо, потрібна інша сторінка?",
  "Або просто зроби паузу ☕",
  "Нічого — теж результат 🙂"
];

const textEl = document.getElementById("text");
const box = document.getElementById("box");

let phraseIndex = 0;
let charIndex = 0;

function type() {
  if (charIndex < phrases[phraseIndex].length) {
    textEl.textContent += phrases[phraseIndex][charIndex];
    charIndex++;
    setTimeout(type, 45);
  } else {
    setTimeout(erase, 1600);
  }
}

function erase() {
  if (charIndex > 0) {
    textEl.textContent =
      phrases[phraseIndex].substring(0, charIndex - 1);
    charIndex--;
    setTimeout(erase, 25);
  } else {
    phraseIndex++;

    if (phraseIndex >= phrases.length) {
      finishAnimation();
      return;
    }

    setTimeout(type, 400);
  }
}

/* м'який звук згасання */
function playFadeSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "sine";
  osc.frequency.setValueAtTime(220, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 3);

  gain.gain.setValueAtTime(0.05, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 3);

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime + 3);
}

function finishAnimation() {
  textEl.classList.remove("cursor");

  // звук
  playFadeSound();

  // затемнення
  document.body.classList.add("fade-dark");

  // зникнення контенту
  setTimeout(() => {
    box.classList.add("fade-out");
  }, 600);

  // повне очищення сторінки
  setTimeout(() => {
    document.body.innerHTML = "";
  }, 3500);
}

type();
</script>

</body>
</html>
